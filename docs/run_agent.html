    <script src="https://cdn.jsdelivr.net/npm/marked@latest/marked.min.js"></script>
    <style>
        /* ── 智能体卡片专属样式 ── */
        .agent-card--disabled { opacity: 0.55; }

        .agent-card-body { padding: 0.75rem 1rem; }
        .agent-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 1.5rem;
        }
        .info-item { display: flex; flex-direction: column; gap: 0.15rem; }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted, #888);
            font-weight: 600;
        }
        .info-value { font-size: 0.85rem; color: var(--text-primary, #e0e0e0); word-break: break-all; }
        .info-url   { font-size: 0.78rem; color: var(--accent, #4fc3f7); }
        .info-key   { font-family: monospace; letter-spacing: 0.1em; color: var(--text-muted, #aaa); }

        /* 徽章 */
        .agent-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.2rem; }
        .badge { font-size: 0.7rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-weight: 600; }
        .badge-enabled  { background: rgba(76,175,80,0.2);  color: #81c784; border: 1px solid #4caf5055; }
        .badge-disabled { background: rgba(244,67,54,0.15); color: #ef9a9a; border: 1px solid #f4433640; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted, #777); }
        .empty-icon  { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-sub   { font-size: 0.85rem; margin-top: 0.25rem; opacity: 0.7; }

        /* 表单 */
        .form-section-title {
            margin: 1.2rem 0 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent, #4fc3f7);
            border-bottom: 1px solid var(--border, #333);
            padding-bottom: 0.3rem;
        }
        .form-section-title:first-child { margin-top: 0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }

        /* API Key 切换 */
        .btn-toggle-key {
            margin-top: 0.3rem;
            background: none;
            border: 1px solid var(--border, #444);
            color: var(--text-muted, #aaa);
            border-radius: 4px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-toggle-key:hover { color: var(--accent, #4fc3f7); border-color: var(--accent, #4fc3f7); }

        .required { color: #ef9a9a; margin-left: 2px; }

        /* btn-warning 兜底 */
        .btn-warning {
            background: rgba(255,152,0,0.2);
            color: #ffb74d;
            border: 1px solid rgba(255,152,0,0.35);
        }
        .btn-warning:hover { background: rgba(255,152,0,0.35); }
    </style>
