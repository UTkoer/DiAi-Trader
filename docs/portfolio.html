<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓分析 - DiAi-Trader</title>
    <link rel="icon" type="image/svg+xml" href="figs/stock.svg">
    <link rel="stylesheet" href="assets/css/styles.css?v=4.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@latest/marked.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">📊</span>
                <h1>DiAi-自交易系统</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">行情展示</a></li>
                <li><a href="portfolio.html" class="nav-link active">持仓分析</a></li>
                <li><a href="choose_stock.html" class="nav-link">标的管理</a></li>
                <li><a href="run_agent.html" class="nav-link">运行智能体</a></li>
                <a href="https://github.com/HKUDS/AI-Trader" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="View source on GitHub">
                <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                </a>
            </ul>
            <div class="market-selector">
                <select id="marketSelector" class="market-select">
                    <option value="sse50" data-dir="agent_data_astock/sse_50_day" selected>🇨🇳 上证50</option>
                    <option value="zxg" data-dir="agent_data_astock/ZSG_17_day">🇨🇳 自选股</option>
                    <!-- <option value="csi300" data-dir="agent_data_astock/csi_300_day">🇨🇳 沪深300</option>
                    <option value="zz500" data-dir="agent_data_astock/zz_500_day">🇨🇳 中证500</option>
                    <option value="gem" data-dir="agent_data_astock/gem_day">🇨🇳 创业板指</option> -->
                </select>
                <div id="granularityWrapper" class="granularity-wrapper hidden">
                    <div class="granularity-divider"></div>
                    <button id="dailyBtn" class="granularity-btn active" title="Daily Data">天</button>
                    <button id="hourlyBtn" class="granularity-btn" title="Hourly Data">小时</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>智能体持仓展示</h2>
            <p class="subtitle">详细分析每个智能体的交易表现</p>
        </header>

        <section class="agent-selector-section">
            <label for="agentSelect">智能体选择:</label>
            <select id="agentSelect" class="agent-select"></select>
        </section>

        <section class="portfolio-grid">
            <div class="portfolio-card">
                <h3>总体信息</h3>
                <div class="metrics-list">
                    <div class="metric-item">
                        <span class="metric-label">总资产价值</span>
                        <span class="metric-value" id="totalAsset">$0.00</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">总收益率</span>
                        <span class="metric-value" id="totalReturn">0.00%</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">现金仓位</span>
                        <span class="metric-value" id="cashPosition">$0.00</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">总交易次数</span>
                        <span class="metric-value" id="totalTrades">0</span>
                    </div>
                </div>
            </div>

            <div class="portfolio-card">
                <h3>持仓比例图</h3>
                <div class="chart-container-small">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
        </section>

        <section class="holdings-section">
            <h3>当前持仓</h3>
            <div class="holdings-scroll-wrapper">
                <div class="holdings-table-container">
                    <table class="holdings-table">
                        <thead>
                            <tr>
                                <th>股票代码</th>
                                <th>仓位</th>
                                <th>股票当前价格</th>
                                <th>持仓市值</th>
                                <th>仓位比例</th>
                            </tr>
                        </thead>
                        <tbody id="holdingsTableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Trading Log Section -->
        <section class="trading-log-section">
            <div class="trading-log-header" id="tradingLogHeader">  <!-- 新添加 -->
                <div class="section-header">
                    <h3>
                        <span class="section-icon">📋</span>
                        交易日志
                        <span class="live-indicator"></span>
                    </h3>
                </div>
                <span class="collapse-icon"></span>
            </div>
            <div class="trading-log-content collapsed" id="tradingLogContent">  <!-- 修改 id 并加 collapsed -->
                <div class="no-selection-message">
                        请从排行榜选择一个智能体查看其详细交易日志
                </div>
            </div>
        </section>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>加载持仓数据中 ...</p>
        </div>


        <button class="scroll-to-top" id="scrollToTop" aria-label="Scroll to top">
            ↑
        </button>
    </main>

    <footer class="footer">
        <p>DiAi &copy; | 智能体自主交易系统</p>
    </footer>

    <script src="assets/js/config-loader.js?v=14.0"></script>
    <script src="assets/js/data-loader.js?v=14.0"></script>
    <script src="assets/js/portfolio.js?v=7.0"></script>
</body>
</html>
